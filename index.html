<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Attendance</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.student{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
margin-top:5px;
}

.present{
background:#27ae60;
color:white;
}

.leave{
background:#e74c3c;
color:white;
}

.final{
background:#2980b9;
color:white;
}

.summary{
margin-top:20px;
font-weight:bold;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#2980b9;
color:white;
}

.warning{
color:red;
font-size:12px;
margin-left:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>Class Attendance</h1>

<div id="students"></div>

<br>

<button class="final" onclick="generateReport()">Generate Report</button>
<button class="final" onclick="copyReport()">Copy Report</button>
<button class="final" onclick="openGroup()">Open WhatsApp Group</button>

<div class="summary" id="summary"></div>

<h3>Attendance History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Student</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

/* ---------- STUDENTS ---------- */

const students=[
"Student 1",
"Student 2",
"Student 3",
"Student 4",
"Student 5"
]

/* ---------- MONTH RESET ---------- */

let currentMonth=new Date().getMonth()

let savedMonth=localStorage.getItem("attendanceMonth")

if(savedMonth===null){

localStorage.setItem("attendanceMonth",currentMonth)

}else if(parseInt(savedMonth)!==currentMonth){

localStorage.removeItem("leaveCount")

localStorage.setItem("attendanceMonth",currentMonth)

}

/* ---------- LOAD STORAGE ---------- */

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]
let leaveCount=JSON.parse(localStorage.getItem("leaveCount"))||{}

students.forEach(s=>{
if(!leaveCount[s]) leaveCount[s]=0
})

let reportText=""

const container=document.getElementById("students")

/* ---------- CREATE STUDENT LIST ---------- */

students.forEach(name=>{

let div=document.createElement("div")
div.className="student"

div.innerHTML=`
<span>${name} <span id="warn-${name}" class="warning"></span></span>

<div>
<button class="present" onclick="mark('${name}','Present')">Present</button>
<button class="leave" onclick="mark('${name}','Leave')">Leave</button>
</div>
`

container.appendChild(div)

})

/* ---------- MARK ATTENDANCE ---------- */

function mark(name,status){

let now=new Date()

let date=now.toLocaleDateString()
let time=now.toLocaleTimeString()

if(status==="Leave"){

leaveCount[name]++

if(leaveCount[name]>3){

document.getElementById("warn-"+name).innerText="Leave limit exceeded!"

}

}

attendance.push({
name:name,
status:status,
date:date,
time:time
})

localStorage.setItem("attendance",JSON.stringify(attendance))
localStorage.setItem("leaveCount",JSON.stringify(leaveCount))

render()

}

/* ---------- RENDER HISTORY ---------- */

function render(){

let history=document.getElementById("history")

history.innerHTML=""

attendance.forEach(a=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${a.date}</td>
<td>${a.time}</td>
<td>${a.name}</td>
<td>${a.status}</td>
`

history.appendChild(tr)

})

updateSummary()

}

/* ---------- SUMMARY ---------- */

function updateSummary(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let present=todayData.filter(a=>a.status==="Present").length
let absent=todayData.filter(a=>a.status==="Leave").length

document.getElementById("summary").innerHTML=`

Total Students : ${students.length}<br>
Present Today : ${present}<br>
Absent Today : ${absent}

`

}

/* ---------- GENERATE REPORT ---------- */

function generateReport(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let present=[]
let absent=[]

todayData.forEach(a=>{

if(a.status==="Present") present.push(a.name)
else absent.push(a.name)

})

reportText="📊 Attendance Report\n\n"

reportText+="Total Students: "+students.length+"\n"
reportText+="Present: "+present.length+"\n"
reportText+="Absent: "+absent.length+"\n\n"

reportText+="✅ Present\n"+present.join("\n")+"\n\n"

reportText+="❌ Absent\n"+absent.join("\n")+"\n\n"

reportText+="📅 Date: "+today+"\n"
reportText+="⏰ Time: "+new Date().toLocaleTimeString()+"\n\n"

reportText+="Leave Count This Month\n"

students.forEach(s=>{
reportText+=s+" : "+leaveCount[s]+" days\n"
})

alert("Report Generated")

}

/* ---------- COPY REPORT ---------- */

function copyReport(){

if(reportText===""){
alert("Generate report first")
return
}

navigator.clipboard.writeText(reportText)

alert("Report copied!")

}

/* ---------- OPEN WHATSAPP GROUP ---------- */

function openGroup(){

window.open("https://chat.whatsapp.com/K3yw8o9KfDqAZvm3NG1Wee")

}

/* ---------- INITIAL LOAD ---------- */

render()

</script>

</body>
</html>
