<head>

<style>

body{
font-family:Arial;
background:#f2f4f7;

padding:10px;
}

.container{
max-width:600px;
margin:auto;

<body>

<div class="container">

<h2>Class Attendance</h2>

<div id="students"></div>

<div class="controls">
<button onclick="generateReport()">Generate</button>
<button onclick="copyReport()">Copy</button>
<button onclick="openGroup()">WhatsApp</button>
<button onclick="resetToday()">Reset</button>
</div>

<div class="summary" id="summary"></div>

<h3>History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

/* STUDENTS */

const students=[
"Akilan","Arockia Raj","Kavibharathi","Gangadevi",
"Sowndharya","Srisakthi","Ajantha","Tamilarasi",
"Abirami","Ayishwarya","Sivagamasundari",
"Anitamary","Swetha","Divyabharathi","Varsha","Kiruthiga"
]

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]
let leaveCount=JSON.parse(localStorage.getItem("leaveCount"))||{}

students.forEach(s=>{
if(!leaveCount[s]) leaveCount[s]=0
})

let reportText=""

const container=document.getElementById("students")

/* CREATE STUDENT LIST */

students.forEach(name=>{

let div=document.createElement("div")

div.className="student"

div.innerHTML=`
<span>${name} <span id="warn-${name}" class="warning"></span></span>
<button id="btn-${name}" class="present" onclick="toggle('${name}')">Present</button>
`

container.appendChild(div)

})

/* TOGGLE */

function toggle(name){

let today=new Date().toLocaleDateString()

let record=attendance.find(a=>a.name===name && a.date===today)

let btn=document.getElementById("btn-"+name)

if(record){

if(record.status==="Present"){

record.status="Absent"
leaveCount[name]++

btn.className="absent"
btn.innerText="Absent"

if(leaveCount[name]>3){
document.getElementById("warn-"+name).innerText="⚠ Limit"
}

}else{

record.status="Present"
leaveCount[name]--

btn.className="present"
btn.innerText="Present"

}

}else{

attendance.push({
name:name,
date:today,
status:"Absent"
})

leaveCount[name]++

btn.className="absent"
btn.innerText="Absent"

}

localStorage.setItem("attendance",JSON.stringify(attendance))
localStorage.setItem("leaveCount",JSON.stringify(leaveCount))

render()

}

/* RESET */

function resetToday(){

let today=new Date().toLocaleDateString()

attendance=attendance.filter(a=>a.date!==today)

students.forEach(name=>{
let btn=document.getElementById("btn-"+name)
btn.className="present"
btn.innerText="Present"
})

localStorage.setItem("attendance",JSON.stringify(attendance))

render()

}

/* RENDER */

function render(){

let history=document.getElementById("history")

history.innerHTML=""

attendance.forEach(a=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${a.date}</td>
<td>${a.name}</td>
<td>${a.status}</td>
`

history.appendChild(tr)

})

updateSummary()

}

/* SUMMARY */

function updateSummary(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let absent=todayData.filter(a=>a.status==="Absent").length

let present=students.length-absent

document.getElementById("summary").innerHTML=
`Total ${students.length} | Present ${present} | Absent ${absent}`

}

/* REPORT */

function generateReport(){

let now=new Date()

let today=now.toLocaleDateString()
let time=now.toLocaleTimeString()
let month=now.toLocaleString('default',{month:'long'})

let todayData=attendance.filter(a=>a.date===today)

let absentList=todayData.map(a=>a.name)

let presentCount=students.length-absentList.length

let msg="📊 Attendance Report\n\n"

msg+="Date: "+today+"\n"
msg+="Time: "+time+"\n"
msg+="Month: "+month+"\n\n"

msg+="Total: "+students.length+"\n"
msg+="Present: "+presentCount+"\n"
msg+="Absent: "+absentList.length+"\n\n"

msg+="Absentees\n"
msg+="----------------\n"

if(absentList.length===0){
msg+="None\n"
}else{

absentList.forEach(name=>{

msg+=name+" | Absent\n"

let used=leaveCount[name]||0
let remaining=3-used

msg+="Leave Remaining: "+remaining+"\n"

if(remaining<0){
msg+="⚠ Leave Limit Exceeded\n"
}

msg+="\n"

})

}

reportText=msg

alert("Report Ready")

}

/* COPY */

function copyReport(){

navigator.clipboard.writeText(reportText)

alert("Copied")

}

/* WHATSAPP */

function openGroup(){

window.open("https://chat.whatsapp.com/K3yw8o9KfDqAZvm3NG1Wee")

}

render()

</script>

]

let savedMonth=localStorage.getItem("attendanceMonth")

if(savedMonth===null){

localStorage.setItem("attendanceMonth",currentMonth)

}else if(parseInt(savedMonth)!==currentMonth){

localStorage.removeItem("leaveCount")

localStorage.setItem("attendanceMonth",currentMonth)

}

/* ---------- LOAD STORAGE ---------- */

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]
let leaveCount=JSON.parse(localStorage.getItem("leaveCount"))||{}

students.forEach(s=>{
if(!leaveCount[s]) leaveCount[s]=0
})

const container=document.getElementById("students")

/* ---------- CREATE STUDENT LIST ---------- */

students.forEach(name=>{

let div=document.createElement("div")
div.className="student"

div.innerHTML=`

<button id="btn-${name}" class="present" onclick="toggleAttendance('${name}')">
Present
</button>
`

container.appendChild(div)

})

/* ---------- TOGGLE ATTENDANCE ---------- */

function toggleAttendance(name){

let today=new Date().toLocaleDateString()
let time=new Date().toLocaleTimeString()

let existing=attendance.find(a=>a.name===name && a.date===today)

let btn=document.getElementById("btn-"+name)

if(existing){

if(existing.status==="Present"){

existing.status="Leave"
leaveCount[name]++

btn.className="leave"
btn.innerText="Leave"

if(leaveCount[name]>3){
document.getElementById("warn-"+name).innerText="Leave limit exceeded!"
}

}else{

existing.status="Present"
leaveCount[name]--

btn.className="present"
btn.innerText="Present"

}

}else{

attendance.push({
name:name,
status:"Present",
date:today,
time:time
})

btn.className="present"
btn.innerText="Present"

}

localStorage.setItem("attendance",JSON.stringify(attendance))
localStorage.setItem("leaveCount",JSON.stringify(leaveCount))

render()

}

/* ---------- RESET TODAY ---------- */

function resetToday(){

let today=new Date().toLocaleDateString()

attendance=attendance.filter(a=>a.date!==today)

students.forEach(name=>{

let btn=document.getElementById("btn-"+name)

if(btn){
btn.className="present"
btn.innerText="Present"
}

})

localStorage.setItem("attendance",JSON.stringify(attendance))

Absent Today : ${absent}

`

}

let absent=[]

else absent.push(a.name)
