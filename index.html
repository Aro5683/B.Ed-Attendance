<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Attendance</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.student{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.present{
background:#27ae60;
color:white;
}

.absent{
background:#e74c3c;
color:white;
}

.final{
background:#2980b9;
color:white;
margin-top:10px;
margin-right:5px;
}

.summary{
margin-top:20px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#2980b9;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Class Attendance</h2>

<div id="students"></div>

<br>

<button class="final" onclick="generateReport()">Generate Report</button>
<button class="final" onclick="copyReport()">Copy Report</button>
<button class="final" onclick="openGroup()">Open WhatsApp Group</button>
<button class="final" onclick="resetToday()">Reset Today</button>

<div class="summary" id="summary"></div>

<h3>Attendance History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

/* STUDENTS */

const students=[
"Akilan","Arockia Raj","Kavibharathi","Gangadevi",
"Sowndharya","Srisakthi","Ajantha","Tamilarasi",
"Abirami","Ayishwarya","Sivagamasundari",
"Anitamary","Swetha","Divyabharathi","Varsha","Kiruthiga"
]

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]

let reportText=""

const container=document.getElementById("students")

/* CREATE STUDENT LIST */

students.forEach(name=>{

let div=document.createElement("div")

div.className="student"

div.innerHTML=`

<span>${name}</span>

<button id="btn-${name}" class="present" onclick="toggle('${name}')">
Present
</button>

`

container.appendChild(div)

})

/* TOGGLE ABSENT */

function toggle(name){

let today=new Date().toLocaleDateString()

let record=attendance.find(a=>a.name===name && a.date===today)

let btn=document.getElementById("btn-"+name)

if(record){

if(record.status==="Present"){

record.status="Absent"
btn.className="absent"
btn.innerText="Absent"

}else{

record.status="Present"
btn.className="present"
btn.innerText="Present"

}

}else{

attendance.push({
name:name,
date:today,
status:"Absent"
})

btn.className="absent"
btn.innerText="Absent"

}

localStorage.setItem("attendance",JSON.stringify(attendance))

render()

}

/* RESET TODAY */

function resetToday(){

let today=new Date().toLocaleDateString()

attendance=attendance.filter(a=>a.date!==today)

students.forEach(name=>{

let btn=document.getElementById("btn-"+name)

btn.className="present"
btn.innerText="Present"

})

localStorage.setItem("attendance",JSON.stringify(attendance))

render()

}

/* RENDER */

function render(){

let history=document.getElementById("history")

history.innerHTML=""

attendance.forEach(a=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${a.date}</td>
<td>${a.name}</td>
<td>${a.status}</td>

`

history.appendChild(tr)

})

updateSummary()

}

/* SUMMARY */

function updateSummary(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let absent=todayData.filter(a=>a.status==="Absent").length

let present=students.length-absent

document.getElementById("summary").innerHTML=

`Total: ${students.length} | Present: ${present} | Absent: ${absent}`

}

/* GENERATE REPORT */

function generateReport(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let absentList=todayData.map(a=>a.name)

let presentList=students.filter(s=>!absentList.includes(s))

let msg="📊 Attendance Report\n"

msg+="Date: "+today+"\n\n"

msg+=`Total: ${students.length} | Present: ${presentList.length} | Absent: ${absentList.length}\n\n`

msg+="Name | Status\n"
msg+="-------------------\n"

students.forEach(name=>{

let status=absentList.includes(name)?"Absent":"Present"

msg+=name+" | "+status+"\n"

})

reportText=msg

alert("Report Generated")

}

/* COPY */

function copyReport(){

navigator.clipboard.writeText(reportText)

alert("Report Copied")

}

/* OPEN GROUP */

function openGroup(){

window.open("https://chat.whatsapp.com/K3yw8o9KfDqAZvm3NG1Wee")

}

render()

</script>

</body>
</html>
<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Student</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

/* ---------- STUDENTS ---------- */

const students=[
"Akilan",
"Arockia Raj",
"Kavibharathi",
"Gangadevi",
"Sowndharya",
"Srisakthi",
"Ajantha",
"Tamilarasi",
"Abirami",
"Ayishwarya",
"Sivagamasundari",
"Anitamary",
"Swetha",
"Divyabharathi",
"Varsha",
"Kiruthiga"
]

/* ---------- MONTH RESET ---------- */

let currentMonth=new Date().getMonth()

let savedMonth=localStorage.getItem("attendanceMonth")

if(savedMonth===null){

localStorage.setItem("attendanceMonth",currentMonth)

}else if(parseInt(savedMonth)!==currentMonth){

localStorage.removeItem("leaveCount")

localStorage.setItem("attendanceMonth",currentMonth)

}

/* ---------- LOAD STORAGE ---------- */

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]
let leaveCount=JSON.parse(localStorage.getItem("leaveCount"))||{}

students.forEach(s=>{
if(!leaveCount[s]) leaveCount[s]=0
})

let reportText=""

const container=document.getElementById("students")

/* ---------- CREATE STUDENT LIST ---------- */

students.forEach(name=>{

let div=document.createElement("div")
div.className="student"

div.innerHTML=`
<span>${name} <span id="warn-${name}" class="warning"></span></span>

<button id="btn-${name}" class="present" onclick="toggleAttendance('${name}')">
Present
</button>
`

container.appendChild(div)

})

/* ---------- TOGGLE ATTENDANCE ---------- */

function toggleAttendance(name){

let today=new Date().toLocaleDateString()
let time=new Date().toLocaleTimeString()

let existing=attendance.find(a=>a.name===name && a.date===today)

let btn=document.getElementById("btn-"+name)

if(existing){

if(existing.status==="Present"){

existing.status="Leave"
leaveCount[name]++

btn.className="leave"
btn.innerText="Leave"

if(leaveCount[name]>3){
document.getElementById("warn-"+name).innerText="Leave limit exceeded!"
}

}else{

existing.status="Present"
leaveCount[name]--

btn.className="present"
btn.innerText="Present"

}

}else{

attendance.push({
name:name,
status:"Present",
date:today,
time:time
})

btn.className="present"
btn.innerText="Present"

}

localStorage.setItem("attendance",JSON.stringify(attendance))
localStorage.setItem("leaveCount",JSON.stringify(leaveCount))

render()

}

/* ---------- RESET TODAY ---------- */

function resetToday(){

let today=new Date().toLocaleDateString()

attendance=attendance.filter(a=>a.date!==today)

students.forEach(name=>{

let btn=document.getElementById("btn-"+name)

if(btn){
btn.className="present"
btn.innerText="Present"
}

})

localStorage.setItem("attendance",JSON.stringify(attendance))

render()

alert("Today's attendance reset")

}

/* ---------- RENDER HISTORY ---------- */

function render(){

let history=document.getElementById("history")

history.innerHTML=""

attendance.forEach(a=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${a.date}</td>
<td>${a.time}</td>
<td>${a.name}</td>
<td>${a.status}</td>
`

history.appendChild(tr)

})

updateSummary()

}

/* ---------- SUMMARY ---------- */

function updateSummary(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let present=todayData.filter(a=>a.status==="Present").length
let absent=todayData.filter(a=>a.status==="Leave").length

document.getElementById("summary").innerHTML=`

Total Students : ${students.length}<br>
Present Today : ${present}<br>
Absent Today : ${absent}

`

}

/* ---------- GENERATE REPORT ---------- */

function generateReport(){

let today=new Date().toLocaleDateString()

let todayData=attendance.filter(a=>a.date===today)

let present=[]
let absent=[]

todayData.forEach(a=>{

if(a.status==="Present") present.push(a.name)
else absent.push(a.name)

})

reportText="📊 Attendance Report\n\n"

reportText+="Total Students: "+students.length+"\n"
reportText+="Present: "+present.length+"\n"
reportText+="Absent: "+absent.length+"\n\n"

reportText+="✅ Present\n"+present.join("\n")+"\n\n"

reportText+="❌ Absent\n"+absent.join("\n")+"\n\n"

reportText+="📅 Date: "+today+"\n"
reportText+="⏰ Time: "+new Date().toLocaleTimeString()+"\n\n"

reportText+="Leave Count This Month\n"

students.forEach(s=>{
reportText+=s+" : "+leaveCount[s]+" days\n"
})

alert("Report Generated")

}

/* ---------- COPY REPORT ---------- */

function copyReport(){

if(reportText===""){
alert("Generate report first")
return
}

navigator.clipboard.writeText(reportText)

alert("Report copied!")

}

/* ---------- OPEN WHATSAPP GROUP ---------- */

function openGroup(){

window.open("https://chat.whatsapp.com/K3yw8o9KfDqAZvm3NG1Wee")

}

/* ---------- INITIAL LOAD ---------- */

render()

</script>

</body>
</html>
